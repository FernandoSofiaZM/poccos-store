backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "productos"
    label: "Productos"
    files:
      - label: "Lista de productos"
        name: "productos"
        file: "productos.json"
        format: "json"
        fields:
          - label: "Productos"
            name: "items"
            widget: "list"
            summary: "{{fields.nombre}} - L{{fields.precio}}"
            fields:
              - { label: "Nombre", name: "nombre", widget: "string" }
              - { label: "Precio (Lempiras)", name: "precio", widget: "number", value_type: "int" }
              - { label: "Imagen", name: "imagen", widget: "image", media_folder: "/images/uploads", public_folder: "/images/uploads" }
              - { label: "Disponible", name: "disponible", widget: "boolean", default: true }
              - { label: "Categoría", name: "categoria", widget: "select", options: ["cadenas", "pulseras", "jueguitos"] }
              - { label: "Descripción", name: "descripcion", widget: "text", required: false }
