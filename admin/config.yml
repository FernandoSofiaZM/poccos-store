backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "productos"
    label: "Productos"
    files:
      - file: "productos.json"
        label: "Lista de productos"
        name: "productos"
        fields:
          - label: "Productos"
            name: "items"
            widget: "list"
            fields:
              - { label: "Nombre", name: "nombre", widget: "string" }
              - { label: "Precio", name: "precio", widget: "number" }
              - { label: "Categoría", name: "categoria", widget: "string" }
              - { label: "Imagen", name: "imagen", widget: "image" }
              - { label: "Disponible", name: "disponible", widget: "boolean", default: true }
