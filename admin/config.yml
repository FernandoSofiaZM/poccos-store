backend:
  name: git-gateway
  branch: main # Asegúrate de que sea "main" o "master"

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "productos"
    label: "Productos"
    folder: "productos"
    create: true
    fields:
      - { label: "Nombre", name: "nombre", widget: "string" }
      - { label: "Precio", name: "precio", widget: "number" }
      - { label: "Imagen", name: "imagen", widget: "image" }
      - { label: "Disponible", name: "disponible", widget: "boolean", default: true }
      - { label: "Categoría", name: "categoria", widget: "string" }
      - { label: "Descripción", name: "descripcion", widget: "text", required: false }
