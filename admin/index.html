<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POCCO'S STORE - Admin</title>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</head>
<body>
  <script>
    // Esperar a que el CMS se cargue completamente
    window.CMS_MANUAL_INIT = true; // Evita auto-inicialización temprana
    document.addEventListener('DOMContentLoaded', function() {
      // Si CMS ya está definido, lo usamos; si no, esperamos un poco más
      function initCMS() {
        if (typeof CMS !== 'undefined') {
          CMS.registerPreviewStyle("/styles.css");
          CMS.init(); // Inicializa manualmente
        } else {
          setTimeout(initCMS, 100);
        }
      }
      initCMS();
    });
  </script>
</body>
</html>
